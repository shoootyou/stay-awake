version: 2

updates:
  # GitHub Actions — check weekly for action version updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  # npm — frontend dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"

  # Cargo — Rust backend dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
