name: Feature Request
description: Suggest a new feature or improvement for Stay Awake
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe the problem you're trying to solve before proposing the solution — this helps us evaluate the request in context.
  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What scenario or pain point led you to this idea?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Stay Awake to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, including workarounds you currently use.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues, etc.
    validations:
      required: false
