name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['src-tauri--release_created'] }}
      tag_name: ${{ steps.release.outputs['src-tauri--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Trigger the release build when a new version is published
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
    permissions:
      contents: write

  # Distribute to package managers after the release build completes
  distribute:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/distribute.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

