name: Distribute

on:
  release:
    types: [published]

# Runs after a draft release is manually published.
# Updates package-manager manifests so users get the new version.

jobs:
  update-homebrew:
    name: Update Homebrew Cask
    runs-on: macos-latest
    environment: public
    steps:
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/No-Sleep-Please!_${{ steps.version.outputs.tag }}_aarch64.dmg"
          curl -fSL "$DMG_URL" -o no-sleep-please.dmg
          SHA256=$(shasum -a 256 no-sleep-please.dmg | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "Computed SHA256: $SHA256"

      # TODO: Replace with your actual homebrew-tap repository
      - name: Checkout Homebrew tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: shoootyou/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > Casks/no-sleep-please.rb << EOF
          cask "no-sleep-please" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/No-Sleep-Please!_#{version}_aarch64.dmg"
            name "No Sleep Please!"
            desc "Keep your computer awake and active"
            homepage "https://github.com/${{ github.repository }}"

            app "No Sleep Please!.app"

            zap trash: [
              "~/Library/Application Support/com.shoootyou.no-sleep-please",
              "~/Library/Preferences/com.shoootyou.no-sleep-please.plist",
            ]
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/no-sleep-please.rb
          git commit -m "no-sleep-please ${{ steps.version.outputs.tag }}"
          git push

  update-winget:
    name: Update winget manifest
    runs-on: windows-latest
    environment: public
    steps:
      - uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: shoootyou.NoSleepPlease
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
