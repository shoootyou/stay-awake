name: Distribute

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  actions: read

concurrency:
  group: distribute
  cancel-in-progress: false

jobs:
  update-homebrew:
    name: Update Homebrew Cask
    runs-on: macos-latest
    environment: public
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release: ${TAG} (version ${VERSION})"

      - name: Download DMG and compute SHA256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Stay.Awake_${VERSION}_aarch64.dmg"
          curl -fSL "$DMG_URL" -o stay-awake.dmg
          SHA256=$(shasum -a 256 stay-awake.dmg | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "Computed SHA256: ${SHA256}"

      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: shoootyou/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p Casks
          cat > Casks/stay-awake.rb << EOF
          cask "stay-awake" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/Stay.Awake_#{version}_aarch64.dmg"
            name "Stay Awake"
            desc "Keep your computer awake and active"
            homepage "https://github.com/${{ github.repository }}"

            app "Stay Awake.app"

            zap trash: [
              "~/Library/Application Support/com.shoootyou.stay-awake",
              "~/Library/Preferences/com.shoootyou.stay-awake.plist",
            ]
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "stay-awake ${{ steps.version.outputs.version }}"
          git push
