<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Non-Sleep — Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <script type="module" src="/settings.js" defer></script>
  </head>
  <body>
    <div class="settings">
      <header>
        <h1>Settings</h1>
      </header>

      <section class="group">
        <label class="field">
          <span class="label">Jiggle Mode</span>
          <select id="jiggle-mode">
            <option value="PowerOnly">Power Only</option>
            <option value="MouseSubtle">Mouse Subtle</option>
            <option value="MouseZen">Mouse Zen</option>
            <option value="MouseCircle">Mouse Circle</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Interval <span class="badge" id="interval-value">30s</span></span>
          <input type="range" id="interval" min="10" max="300" step="5" value="30" />
          <span class="range-labels">
            <span>10s</span>
            <span>300s</span>
          </span>
        </label>
      </section>

      <section class="group">
        <label class="field">
          <span class="label">App Mode</span>
          <select id="app-mode">
            <option value="Manual">Manual</option>
            <option value="AlwaysOn">Always On</option>
          </select>
        </label>

        <label class="field row">
          <input type="checkbox" id="autostart" />
          <span class="label">Launch at Login</span>
        </label>
      </section>

      <section class="group">
        <label class="field">
          <span class="label">Language</span>
          <select id="language">
            <option value="en">English</option>
          </select>
        </label>

        <div class="field">
          <span class="label">Global Hotkey</span>
          <kbd id="hotkey">CmdOrCtrl+Shift+J</kbd>
        </div>
      </section>

      <div id="accessibility-banner" class="banner hidden">
        <span>⚠️ Accessibility permission required for mouse jiggle modes.</span>
        <button id="grant-btn" class="link">Grant Access →</button>
      </div>

      <footer>
        <button id="cancel-btn" class="secondary">Cancel</button>
        <button id="save-btn" class="primary">Save</button>
      </footer>
    </div>
  </body>
</html>
