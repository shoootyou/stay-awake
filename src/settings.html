<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Non-Sleep — Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <script type="module" src="/settings.js" defer></script>
  </head>
  <body>
    <div class="settings">
      <header>
        <h1 data-i18n="settings-title">Settings</h1>
      </header>

      <section class="group">
        <label class="field">
          <span class="label" data-i18n="settings-mode-label">Jiggle Mode</span>
          <select id="jiggle-mode">
            <option value="PowerOnly" data-i18n="tray-mode-power">Power Only</option>
            <option value="MouseSubtle" data-i18n="tray-mode-subtle">Mouse Subtle</option>
            <option value="MouseZen" data-i18n="tray-mode-zen">Mouse Zen</option>
            <option value="MouseCircle" data-i18n="tray-mode-circle">Mouse Circle</option>
          </select>
        </label>

        <label class="field">
          <span class="label" data-i18n="settings-interval-label">Interval <span class="badge" id="interval-value">30s</span></span>
          <input type="range" id="interval" min="10" max="300" step="5" value="30" />
          <span class="range-labels">
            <span>10s</span>
            <span>300s</span>
          </span>
        </label>
      </section>

      <section class="group">
        <label class="field">
          <span class="label" data-i18n="settings-app-mode-label">App Mode</span>
          <select id="app-mode">
            <option value="Manual">Manual</option>
            <option value="AlwaysOn">Always On</option>
          </select>
        </label>

        <label class="field row">
          <input type="checkbox" id="autostart" />
          <span class="label" data-i18n="settings-autostart-label">Launch at Login</span>
        </label>
      </section>

      <section class="group">
        <label class="field">
          <span class="label" data-i18n="settings-language-label">Language</span>
          <select id="language">
            <option value="en">English</option>
            <option value="es">Espanol</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="pt-BR">Portugues (BR)</option>
            <option value="ja">Japanese</option>
            <option value="zh-Hans">Chinese (Simplified)</option>
            <option value="ko">Korean</option>
          </select>
        </label>

        <div class="field">
          <span class="label" data-i18n="settings-hotkey-label">Global Hotkey</span>
          <kbd id="hotkey">CmdOrCtrl+Shift+J</kbd>
        </div>
      </section>

      <section class="group" id="schedule-section">
        <div class="group-header" data-i18n="schedule-label">Schedule</div>
        <label class="field row">
          <input type="checkbox" id="schedule-enabled" />
          <span class="label" data-i18n="schedule-enabled">Enable schedule</span>
        </label>
        <div class="field schedule-times">
          <label class="time-field">
            <span class="label-sm" data-i18n="schedule-start">Start time</span>
            <input type="time" id="schedule-start" value="09:00" />
          </label>
          <label class="time-field">
            <span class="label-sm" data-i18n="schedule-end">End time</span>
            <input type="time" id="schedule-end" value="17:00" />
          </label>
        </div>
        <div class="field">
          <span class="label-sm" data-i18n="schedule-days">Active days</span>
          <div class="day-checkboxes">
            <label><input type="checkbox" value="mon" checked /><span data-i18n="schedule-mon">Mon</span></label>
            <label><input type="checkbox" value="tue" checked /><span data-i18n="schedule-tue">Tue</span></label>
            <label><input type="checkbox" value="wed" checked /><span data-i18n="schedule-wed">Wed</span></label>
            <label><input type="checkbox" value="thu" checked /><span data-i18n="schedule-thu">Thu</span></label>
            <label><input type="checkbox" value="fri" checked /><span data-i18n="schedule-fri">Fri</span></label>
            <label><input type="checkbox" value="sat" /><span data-i18n="schedule-sat">Sat</span></label>
            <label><input type="checkbox" value="sun" /><span data-i18n="schedule-sun">Sun</span></label>
          </div>
        </div>
      </section>

      <section class="group" id="profile-section">
        <div class="group-header" data-i18n="profile-label">Profile</div>
        <div class="field profile-row">
          <select id="profile-select">
            <option value="Default" data-i18n="profile-default">Default</option>
          </select>
          <button id="profile-save-btn" class="small" data-i18n="profile-save-as">Save as...</button>
          <button id="profile-delete-btn" class="small secondary" data-i18n="profile-delete">Delete</button>
        </div>
      </section>

      <div id="accessibility-banner" class="banner hidden">
        <span data-i18n="settings-accessibility-banner">Accessibility permission required for mouse jiggle modes.</span>
        <button id="grant-btn" class="link" data-i18n="settings-grant-btn">Grant Access</button>
      </div>

      <footer>
        <button id="cancel-btn" class="secondary" data-i18n="settings-cancel">Cancel</button>
        <button id="save-btn" class="primary" data-i18n="settings-save">Save</button>
      </footer>
    </div>
  </body>
</html>
